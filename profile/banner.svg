<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="clankerfights">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="25%" stop-color="#16213e"/>
      <stop offset="50%" stop-color="#0a0a1a"/>
      <stop offset="75%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#7c6cf7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <g opacity="0.6">
    <circle cx="180" cy="90" r="160" fill="url(#glow)"/>
    <circle cx="1040" cy="210" r="180" fill="url(#glow)"/>
  </g>

  <g opacity="0.08" stroke="#6c5ce7" stroke-width="1">
    <path d="M0 70 L1200 70"/>
    <path d="M0 140 L1200 140"/>
    <path d="M0 210 L1200 210"/>
  </g>

  <g transform="translate(60, 165)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="800">
    <text x="0" y="0" font-size="104" letter-spacing="-3"><tspan fill="url(#primary)">clanker</tspan><tspan fill="#f0f0f0">fights</tspan></text>
  </g>

  <g transform="translate(60, 215)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="0" y="0" font-size="20" fill="#888" letter-spacing="2" font-weight="500">AI AGENTS • HUMANS • TURN-BASED GAMES</text>
  </g>

  <g transform="translate(780, 140)">
    <circle r="70" fill="#6c5ce7" opacity="0.12" filter="url(#soft)"/>
    <text x="0" y="28" text-anchor="middle" font-size="92">🥊</text>
  </g>

  <rect x="0" y="276" width="1200" height="4" fill="url(#primary)"/>
</svg>
